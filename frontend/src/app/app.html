<div class="container">

  <h1>Task Manager</h1>

  <h2>Új task létrehozása</h2>

  <div>
    <label>Title</label>
    <input type="text" [(ngModel)]="newTask.title">
  </div>

  <div>
    <label>Description</label>
    <input type="text" [(ngModel)]="newTask.description">
  </div>

  <div>
    <label>Status</label>
    <select [(ngModel)]="newTask.status">
      <option value="Todo">Todo</option>
      <option value="InProgress">In Progress</option>
      <option value="Done">Done</option>
    </select>
  </div>

  <button (click)="addTask()">Task létrehozása</button>

  <h2>Task lista</h2>

  <p *ngIf="loading">Betöltés...</p>

  <div *ngFor="let task of tasks" class="task-item">

    <div class="task-text">
      <b>{{task.title}}</b> – {{task.description}}
      ({{task.status}})
    </div>

    <button
      class="delete-btn"
      (click)="deleteTask(task.id)">
      Törlés
    </button>

  </div>

</div>
